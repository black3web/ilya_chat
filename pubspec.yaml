name: ilya_chat
description: ILYA-Chat - Next Generation Messaging by المبرمج إيليا
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3

  # State
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  animations: ^2.0.11

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  video_player: ^2.9.1
  photo_view: ^0.14.0

  # Audio
  record: ^5.1.2
  audioplayers: ^6.1.0
  just_audio: ^0.9.40

  # Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^17.2.4

  # i18n — must match SDK pin
  intl: ^0.20.0

  # Utils
  uuid: ^4.4.2
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  vibration: ^2.0.0
  timeago: ^3.7.0
  equatable: ^2.0.5
  connectivity_plus: ^6.1.0
  device_info_plus: ^10.1.2
  package_info_plus: ^8.1.0
  local_auth: ^2.3.0
  share_plus: ^10.0.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  encrypt: ^5.0.3
  crypto: ^3.0.3
  path: ^1.9.0
  rxdart: ^0.28.0
  emoji_picker_flutter: ^4.4.0
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.69.0
  dio: ^5.7.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
